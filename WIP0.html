<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>
    <link rel="stylesheet" href="./stylesheet/sylesheetWIP0.css"> <!-- Link to external CSS file if you have one-->
</head>
<body>
    <h1>In Passing</h1>
    <p>By Matthew Shenoda, Page made by Isael Olmedo Mayo</p>

    <div class="buttonContainer">
    <button style="color: blue; font-size: x-large; background-color: brown; transform: rotate(30deg); position: absolute;" type="button" onclick="openNextButton('button2').classList.remove('hidden')" id="button1">There is something inside</button>
    <button style="transform: rotate(70deg);" type="button" class="hidden" id="button2" onclick="openNextButton('button3').classList.remove('hidden')">each of us</button>
    <button style="transform: rotate(190deg);" type="button" class="hidden" id="button3" onclick="openNextButton('button4').classList.remove('hidden')">that scurries toward the past!</button>
    <button style="transform: rotate(210deg);" type="button" class="hidden" id="button4" onclick="openNextButton('button6').classList.remove('hidden')">in our bodies a rooted history</button>
    <button style="transform: rotate(35deg); left: 10px; top: 10px;" type="button" onclick="addThreeButtons('button5').classList.remove('hidden')" id="button5" > To Be Or Not To Be </button>
    <button style="transform: rotate(90deg);" type="button" class="hidden" onclick="openNextButton('button').classList.remove('hidden')" id="button6" > So Many Buttons </button>
    <button style="transform: rotate(90deg);" type="button" class="hidden" onclick="openNextButton('textArea5').classList.remove('hidden')" id="button7" > So Many Buttons </button>
    </div>

    <script src="./javascript/scriptWIP0.js"></script>

    <div class="container" id="container">
        <button id="mainBtn" style="left: 10px; top: 10px;"> I Can't Be Clicked </button>
    </div>

    <script>
        const container = document.getElementById('container');
        const mainBtn = document.getElementById('button6');

        // Function to move a button to a random position
        function moveButton(btn) {
            const maxX = container.clientWidth - btn.offsetWidth;
            const maxY = container.clientHeight - btn.offsetHeight;
            btn.style.left = Math.random() * maxX + 'px';
            btn.style.top = Math.random() * maxY + 'px';
        }

        // Function to create a new styled button
        function createNewButton() {
            const newBtn = document.createElement('button'); // Create element
            newBtn.textContent = 'Why AM I BEIng CLicked On';
            
            // Generate random styles
            const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16);
            const randomFontSize = Math.floor(Math.random() * 15 + 12) + 'px'; // 12px to 27px
            
            // Apply styles using .style property
            newBtn.style.backgroundColor = randomColor;
            newBtn.style.fontSize = randomFontSize;
            newBtn.style.color = 'white';
            
            // Set initial random position
            moveButton(newBtn);
            
            // Make new buttons also move when clicked
            newBtn.onclick = () => moveButton(newBtn);
            
            container.appendChild(newBtn); // Add to page
        }

        // Main button logic
        mainBtn.onclick = () => {
            moveButton(mainBtn);
            createNewButton();
        };
    </script>



</body>

</html>
