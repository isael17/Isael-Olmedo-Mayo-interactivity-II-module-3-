<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Index</title>
<link rel="stylesheet" href="styles.css"> <!-- Link to external CSS file if you have one-->
</head>
<body>
<p id="addition"></p>
<script>
function add(a, b, c, d, e) {
  return a + b + c + d + e;
}

let result = add(59, 93, 67, 89, 78);

document.getElementById("addition").innerHTML = "The sum is " + result;
</script>
</body>
</html>
